<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="100%" stop-color="#0d001a"/>
    </radialGradient>

    <style>
      .star { animation: blink var(--d, 2s) infinite ease-in-out; }
      @keyframes blink {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }

      .planet { animation: float 6s infinite ease-in-out; }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      .shooting { animation: shoot 8s infinite linear; }
      @keyframes shoot {
        0%   { transform: translate(-80px, -80px) rotate(45deg); opacity: 0; }
        5%   { opacity: 1; }
        20%  { transform: translate(500px, 500px) rotate(45deg); opacity: 0; }
        100% { opacity: 0; }
      }

      .title {
        font-family: Verdana, sans-serif;
        font-size: 44px;
        font-weight: bold;
        fill: white;
        letter-spacing: 3px;
        filter: drop-shadow(0 0 12px rgba(199,125,255,0.6));
      }
      .subtitle {
        font-family: Verdana, sans-serif;
        font-size: 11px;
        fill: #c77dff;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .big-star { fill: #c084fc; opacity: 0.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="15" fill="url(#bgGrad)"/>

  <!-- Small stars -->
  <circle class="star" cx="120" cy="10"  r="1.5" fill="#e9d5ff" style="--d:1.5s"/>
  <circle class="star" cx="320" cy="24"  r="1.5" fill="#e9d5ff" style="--d:2.1s"/>
  <circle class="star" cx="520" cy="50"  r="1.5" fill="#e9d5ff" style="--d:1.8s"/>
  <circle class="star" cx="680" cy="16"  r="1.5" fill="#e9d5ff" style="--d:2.5s"/>
  <circle class="star" cx="80"  cy="90"  r="1.5" fill="#e9d5ff" style="--d:1.2s"/>
  <circle class="star" cx="720" cy="110" r="1.5" fill="#e9d5ff" style="--d:3.0s"/>
  <circle class="star" cx="400" cy="150" r="1.5" fill="#e9d5ff" style="--d:1.7s"/>
  <circle class="star" cx="160" cy="170" r="1.5" fill="#e9d5ff" style="--d:2.2s"/>
  <circle class="star" cx="600" cy="184" r="1.5" fill="#e9d5ff" style="--d:1.9s"/>
  <circle class="star" cx="200" cy="70"  r="1.5" fill="#e9d5ff" style="--d:2.4s"/>
  <circle class="star" cx="480" cy="120" r="1.5" fill="#e9d5ff" style="--d:1.6s"/>
  <circle class="star" cx="40"  cy="40"  r="1.5" fill="#e9d5ff" style="--d:2.8s"/>
  <circle class="star" cx="760" cy="160" r="1.5" fill="#e9d5ff" style="--d:1.3s"/>
  <circle class="star" cx="560" cy="100" r="1.5" fill="#e9d5ff" style="--d:2.6s"/>
  <circle class="star" cx="440" cy="30"  r="1.5" fill="#e9d5ff" style="--d:1.4s"/>
  <circle class="star" cx="640" cy="80"  r="1.5" fill="#e9d5ff" style="--d:2.1s"/>
  <circle class="star" cx="96"  cy="140" r="1.5" fill="#e9d5ff" style="--d:1.8s"/>
  <circle class="star" cx="736" cy="60"  r="1.5" fill="#e9d5ff" style="--d:2.3s"/>
  <circle class="star" cx="480" cy="130" r="1.5" fill="#e9d5ff" style="--d:1.5s"/>
  <circle class="star" cx="240" cy="20"  r="1.5" fill="#e9d5ff" style="--d:2.7s"/>

  <!-- Big stars -->
  <text class="big-star" x="176" y="36"  font-size="14">★</text>
  <text class="big-star" x="656" y="144" font-size="14">★</text>
  <text class="big-star" x="40"  y="84"  font-size="14">★</text>
  <text class="big-star" x="360" y="174" font-size="14">★</text>
  <text class="big-star" x="720" y="24"  font-size="14">★</text>

  <!-- Planets -->
  <g class="planet" transform-origin="600 32">
    <circle cx="600" cy="32" r="10" fill="url(#planetGrad1)"/>
  </g>
  <g class="planet" style="animation-delay:-3s" transform-origin="80 162">
    <circle cx="80" cy="162" r="10" fill="url(#planetGrad2)"/>
  </g>

  <defs>
    <radialGradient id="planetGrad1" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="planetGrad2" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>

    <!-- Shooting star gradient -->
    <linearGradient id="shootGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Shooting star -->
  <rect class="shooting" x="120" y="10" width="80" height="2" rx="1" fill="url(#shootGrad)"/>

  <!-- Title -->
  <text class="title"    x="400" y="105" text-anchor="middle">JÚLIA SANTOS</text>
  <text class="subtitle" x="400" y="128" text-anchor="middle">WELCOME TO MY UNIVERSE</text>
</svg>
